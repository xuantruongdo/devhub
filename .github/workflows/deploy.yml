name: 🚀 Deploy DevHub

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [frontend, backend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        run: |
          docker build -t xuantruongdo/devhub:${{ matrix.service }} ./${{ matrix.service }}
          docker push xuantruongdo/devhub:${{ matrix.service }}

  deploy:
    runs-on: ubuntu-latest
    needs: build  # chỉ chạy khi build xong

    steps:
      - name: Deploy VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/devhub
            docker compose pull
            docker compose up -d