services:
  # ===== BACKEND =====
  backend:
    build:
      context: ./backend # Thư mục chứa source code backend
      dockerfile: Dockerfile # Tên file Dockerfile để build image
    container_name: backend # Đặt tên container (thay vì tên random)
    ports:
      - "4040:4040" # Map port: máy_host:container (truy cập từ ngoài vào)
    restart: unless-stopped # Tự restart nếu crash, trừ khi bị stop thủ công
    env_file:
      - .env # Đọc biến môi trường từ file .env
    depends_on:
      postgres:
        condition: service_healthy # Chờ postgres healthy rồi mới start backend
      redis:
        condition: service_healthy # Chờ redis healthy rồi mới start backend
      elasticsearch:
        condition: service_healthy # Chờ elasticsearch healthy rồi mới start backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4040/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - app_network # Kết nối vào mạng nội bộ app_network
    logging:
      driver: "json-file" # Ghi log dạng JSON ra file
      options:
        max-size: "10m" # Mỗi file log tối đa 10MB
        max-file: "3" # Giữ tối đa 3 file log (rotate), tránh đầy đĩa

  # ===== FRONTEND =====
  frontend:
    build:
      context: ./frontend # Thư mục chứa source code frontend
      dockerfile: Dockerfile # Tên file Dockerfile để build image
    container_name: frontend
    ports:
      - "3000:3000" # Expose port 3000 ra ngoài
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy # Chờ backend healthy rồi mới start frontend
    networks:
      - app_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===== POSTGRES =====
  postgres:
    image: postgres:15 # Dùng image PostgreSQL version 15 từ Docker Hub
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER} # Tên user DB, lấy từ .env
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} # Password DB, lấy từ .env
      POSTGRES_DB: ${POSTGRES_DB} # Tên database mặc định, lấy từ .env
    volumes:
      - postgres_data:/var/lib/postgresql/data # Mount volume để data không mất khi restart container
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      # pg_isready: tool có sẵn trong postgres, kiểm tra DB đã sẵn sàng nhận kết nối chưa
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s # Postgres cần ~20s để khởi tạo lần đầu
    networks:
      - app_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===== REDIS =====
  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1000 --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===== ELASTICSEARCH =====
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.3 # Image chính thức từ Elastic (không phải Docker Hub)
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - node.name=es01 # Tên node trong cluster
      - discovery.type=single-node # Chạy 1 node duy nhất (không tìm node khác để tạo cluster)
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD} # Password cho user "elastic" (superuser mặc định)
      - xpack.security.enabled=true # Bật bảo mật (yêu cầu xác thực username/password)
      - xpack.security.http.ssl.enabled=false # Tắt SSL/HTTPS (dùng HTTP thuần, phù hợp khi có reverse proxy bên ngoài)
      - bootstrap.memory_lock=true # Khóa RAM, không cho OS swap memory ES ra đĩa (tăng hiệu năng)
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # JVM heap: min và max đều 512MB (nên để bằng nhau để tránh resize)
      - cluster.routing.allocation.disk.threshold_enabled=true # Bật tính năng theo dõi dung lượng đĩa
      - cluster.routing.allocation.disk.watermark.low=85% # Khi đĩa đầy 85%: cảnh báo, không phân bổ shard mới
      - cluster.routing.allocation.disk.watermark.high=90% # Khi đĩa đầy 90%: bắt đầu di chuyển shard sang node khác
    ulimits:
      memlock:
        soft: -1 # Không giới hạn memlock (cần thiết cho bootstrap.memory_lock=true)
        hard: -1 # Không giới hạn memlock ở mức hệ thống
      nofile:
        soft: 65536 # Cho phép mở tối đa 65536 file cùng lúc (ES mở rất nhiều file index)
        hard: 65536 # Giới hạn cứng cũng là 65536
    volumes:
      - es_data:/usr/share/elasticsearch/data # Mount volume lưu data index, không mất khi restart
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -u elastic:$${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q '\"status\"'"
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - app_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ===== VOLUMES =====
volumes:
  postgres_data: # Volume lưu data PostgreSQL (được Docker quản lý, nằm ở /var/lib/docker/volumes/)
  redis_data: # Volume lưu data Redis (snapshot + AOF)
  es_data:
    # Volume lưu data Elasticsearch (index, segments...)

    # ===== NETWORKS =====
networks:
  app_network:
    driver: bridge
    # Tạo mạng nội bộ riêng cho toàn bộ app
    # bridge: các container cùng network giao tiếp
