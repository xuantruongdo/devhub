# ===== VOLUMES =====
volumes:
  postgres_data: # Volume lưu data PostgreSQL — Docker quản lý tại /var/lib/docker/volumes/
  redis_data: # Volume lưu data Redis — bao gồm dump.rdb (snapshot RDB) và appendonly.aof (AOF)
  # es_data:
    # Volume lưu data Elasticsearch — index, segments, translog...

    # ===== NETWORKS =====
networks:
  app_network:
    # Định nghĩa mạng nội bộ dùng chung cho toàn bộ app
    driver: bridge # Driver "bridge": tạo switch ảo riêng, các container cùng network giao tiếp qua tên service
