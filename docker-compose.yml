services:

  # ===== BACKEND =====
  backend:
    # Định nghĩa service tên "backend"
    image: xuantruongdo/devhub:backend
    container_name: backend # Đặt tên cố định cho container (không dùng tên random)
    ports:
      - "4040:4040" # Map port host:container — truy cập localhost:4040 → container:4040
    restart: unless-stopped # Tự restart khi crash, trừ khi bị stop thủ công bằng docker stop
    env_file:
      - .env # Nạp toàn bộ biến môi trường từ file .env vào container
    depends_on:
      # Khai báo thứ tự khởi động — backend chờ các service sau sẵn sàng
      postgres:
        condition: service_healthy # Chờ postgres báo healthy rồi mới start backend
      redis:
        condition: service_healthy # Chờ redis báo healthy rồi mới start backend
      # elasticsearch:
      #   condition: service_healthy # Chờ elasticsearch báo healthy rồi mới start backend
    healthcheck:
      # Cấu hình kiểm tra sức khỏe định kỳ của container backend
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:4040/health', r =>
            process.exit(r.statusCode === 200 ? 0 : 1))",
        ] # Gọi HTTP đến /health, thoát 0 nếu status 200 (healthy), thoát 1 nếu không
      interval: 15s # Chạy healthcheck mỗi 15 giây một lần
      timeout: 10s # Nếu healthcheck không trả lời trong 10s thì coi là failed
      retries: 5 # Thử lại tối đa 5 lần trước khi đánh dấu container unhealthy
      start_period: 120s # Bỏ qua failed trong 120s đầu để backend có thời gian khởi động
    networks:
      - app_network # Kết nối container vào mạng nội bộ app_network để giao tiếp với các service khác
    logging:
      driver: "json-file" # Ghi log ra file dạng JSON (driver mặc định của Docker)
      options:
        max-size: "10m" # Mỗi file log tối đa 10MB rồi bắt đầu rotate
        max-file: "3" # Giữ tối đa 3 file log xoay vòng, tránh log chiếm đầy đĩa

  # ===== MIGRATION =====
  migration:
    image: xuantruongdo/devhub:backend
    container_name: migration # Đặt tên cố định cho container migration
    env_file:
      - .env # Nạp biến môi trường từ .env (cần DB_HOST, DB_PORT, DB_USER... để kết nối postgres)
    depends_on:
      postgres:
        condition: service_healthy # Chờ postgres healthy rồi mới chạy migration, tránh kết nối DB thất bại
    command: pnpm migration:run # Ghi đè lệnh mặc định: chạy script migration thay vì start server
    networks:
      - app_network # Kết nối vào mạng nội bộ để có thể kết nối tới container postgres

  # ===== FRONTEND =====
  frontend:
    # Định nghĩa service tên "frontend"
    image: xuantruongdo/devhub:frontend
    container_name: frontend # Đặt tên cố định cho container frontend
    ports:
      - "3000:3000" # Map port 3000 host → 3000 container (thường là Next.js / React)
    restart: unless-stopped # Tự restart khi crash, trừ khi bị stop thủ công
    env_file:
      - .env # Nạp biến môi trường từ .env (ví dụ: NEXT_PUBLIC_API_URL)
    depends_on:
      backend:
        condition: service_healthy # Chờ backend healthy rồi mới start frontend (tránh gọi API khi backend chưa sẵn sàng)
    networks:
      - app_network # Kết nối vào mạng nội bộ app_network
    logging:
      driver: "json-file" # Ghi log ra file JSON
      options:
        max-size: "10m" # Giới hạn mỗi file log tối đa 10MB
        max-file: "3" # Giữ tối đa 3 file log, file cũ nhất bị xóa khi vượt giới hạn

  # ===== POSTGRES =====
  postgres:
    # Định nghĩa service database PostgreSQL
    image: postgres:15 # Dùng image PostgreSQL version 15 từ Docker Hub (không tự build)
    container_name: postgres # Đặt tên cố định cho container postgres
    restart: unless-stopped # Tự restart khi crash, trừ khi bị stop thủ công
    environment:
      # Biến môi trường cấu hình PostgreSQL khi khởi tạo lần đầu
      POSTGRES_USER: ${POSTGRES_USER} # Tên superuser của database, lấy từ .env
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} # Password của superuser, lấy từ .env
      POSTGRES_DB: ${POSTGRES_DB} # Tên database mặc định sẽ được tạo khi init, lấy từ .env
    volumes:
      - postgres_data:/var/lib/postgresql/data # Mount volume để data DB không mất khi container restart/xóa
    healthcheck:
      # Kiểm tra postgres đã sẵn sàng nhận kết nối chưa
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ] # pg_isready: tool built-in kiểm tra DB có accept connection không
      interval: 10s # Chạy healthcheck mỗi 10 giây
      timeout: 5s # Timeout mỗi lần kiểm tra là 5 giây
      retries: 5 # Thử lại tối đa 5 lần trước khi đánh dấu unhealthy
      start_period: 20s # Bỏ qua lỗi trong 20s đầu (postgres cần thời gian init data lần đầu)
    networks:
      - app_network # Kết nối vào mạng nội bộ, backend kết nối DB qua hostname "postgres"
    logging:
      driver: "json-file" # Ghi log ra file JSON
      options:
        max-size: "10m" # Giới hạn mỗi file log 10MB
        max-file: "3" # Giữ tối đa 3 file log xoay vòng

  # ===== REDIS =====
  redis:
    # Định nghĩa service cache Redis
    image: redis:7 # Dùng image Redis version 7 từ Docker Hub
    container_name: redis # Đặt tên cố định cho container redis
    restart: unless-stopped # Tự restart khi crash, trừ khi bị stop thủ công
    command: >
      redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1000 --appendonly yes
    volumes:
      - redis_data:/data # Mount volume lưu file snapshot (dump.rdb) và AOF (appendonly.aof)
    healthcheck:
      # Kiểm tra Redis có đang chạy và phản hồi không
      test: [ "CMD", "redis-cli", "ping" ] # Gửi lệnh PING tới Redis, healthy nếu trả về PONG
      interval: 10s # Chạy healthcheck mỗi 10 giây
      timeout: 5s # Timeout mỗi lần kiểm tra là 5 giây
      retries: 5 # Thử lại tối đa 5 lần trước khi đánh dấu unhealthy
      start_period: 10s # Bỏ qua lỗi trong 10s đầu để Redis có thời gian load AOF từ đĩa
    networks:
      - app_network # Kết nối vào mạng nội bộ, backend kết nối Redis qua hostname "redis"
    logging:
      driver: "json-file" # Ghi log ra file JSON
      options:
        max-size: "10m" # Giới hạn mỗi file log 10MB
        max-file: "3" # Giữ tối đa 3 file log xoay vòng

